name: CI

on:
  push:
  pull_request:

jobs:
  spdx-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun scripts/check-spdx-headers.js --all

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      # Biome (lint + format + import-organize) in CI mode. Pinned to match the
      # @biomejs/biome devDependency in package.json — keep the two in sync.
      # Run via bunx rather than a full `bun install` — lint only needs source
      # text, not the resolved dependency tree.
      - run: bunx @biomejs/biome@2.5.3 ci

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install mise (for the MiseEnvironmentProvider integration test)
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install and build
        run: bun install && bun run build
      # Real `node --test`, not `bun test`: bun's own node:test
      # compatibility layer has a still-unfixed upstream bug
      # (oven-sh/bun#23077) that used to need a narrow, grep-gated retry
      # here, since removed entirely rather than merely relaxed.
      # scripts/run-tests.js compiles test/ to CommonJS via tsc and runs the
      # result under real Node, which the test files were always compatible
      # with (none import from "bun:test") -- bun remains this repo's
      # install/build toolchain, only the test runner changed.
      - name: Test
        run: node scripts/run-tests.js
      - name: Typecheck the whole tree, including tests (#30)
        run: bun run typecheck:test
      - name: Compileability regression check (bun build --compile)
        run: bun run compile
