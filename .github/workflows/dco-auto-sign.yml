name: DCO Auto-sign for Dependabot

on:
  pull_request:
    # Run after dependabot opens the PR, but before CI checks run
    types: [opened, synchronize]

jobs:
  dco-sign:
    runs-on: ubuntu-latest
    # Run for dependabot PRs or when working on dependabot branches
    if: github.actor == 'dependabot[bot]' || contains(github.head_ref, 'dependabot/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token with write access to push the amended commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --local user.name "dependabot[bot]"
          git config --local user.email "49699333+dependabot[bot]@users.noreply.github.com"

      - name: Add DCO sign-off to all commits
        run: |
          # Get the base and head SHAs
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # Get all commits in the PR
          COMMITS=$(git rev-list "${BASE_SHA}..${HEAD_SHA}")

          if [ -z "$COMMITS" ]; then
            echo "No commits to sign"
            exit 0
          fi

          # Rebase and add sign-off to each commit
          git rebase --signoff "${BASE_SHA}" "${HEAD_SHA}"

          # Force-push the amended commits back to the PR branch
          git push --force-with-lease origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ DCO sign-off added automatically'
            })
