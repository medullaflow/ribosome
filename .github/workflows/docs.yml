# Builds and publishes the docs/site Astro+Starlight project to GitHub Pages
# on every push to main that touches it. Unlike ribosome-schema's own
# publish-pages.yml, this is the only Pages-publishing workflow in this repo
# -- no separate deploy target to merge with or clobber (#51).
#
# One-time manual step this workflow cannot do: enable "GitHub Actions" as
# the Pages source in this repo's Settings -> Pages, and set the custom
# domain to docs/site/public/CNAME's value (ribosome.medullaflow.org). Until
# that's done, this workflow will fail at the deploy-pages step even though
# the build succeeds.

name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: docs/site
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
