name: DCO

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Signed-off-by on every commit
        run: node scripts/check-dco.js ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
